<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Shop Checkout</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="checkout-container">
        <header class="checkout-header">
            <div class="header-left">
                <h1>Checkout</h1>
                <span class="item-badge">3 ITEMS</span>
            </div>
        </header>

        <div class="checkout-layout">
            <!-- Summary Section -->
            <section class="summary-section">
                <div class="product-list">
                    <!-- iPhone -->
                    <div class="product-item">
                        <div class="product-image">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="product-svg"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                        </div>
                        <div class="product-info">
                            <h3>iPhone 12 Pro</h3>
                            <p class="product-detail">Golden</p>
                            <div class="product-quantity">x 1</div>
                        </div>
                        <div class="product-price">$999.00</div>
                        <button class="remove-item">&times;</button>
                    </div>

                    <!-- Apple Watch -->
                    <div class="product-item">
                        <div class="product-image">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="product-svg"><path d="M16 2H8C6.34315 2 5 3.34315 5 5V19C5 20.6569 6.34315 22 8 22H16C17.6569 22 19 20.6569 19 19V5C19 3.34315 17.6569 2 16 2Z"/><path d="M9 6H15"/><path d="M9 18H15"/><circle cx="12" cy="12" r="3"/></svg>
                        </div>
                        <div class="product-info">
                            <h3>Apple Watch</h3>
                            <p class="product-detail">Blue</p>
                            <div class="product-quantity">x 1</div>
                        </div>
                        <div class="product-price">$399.00</div>
                        <button class="remove-item">&times;</button>
                    </div>

                    <!-- iMac -->
                    <div class="product-item">
                        <div class="product-image">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="product-svg"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><path d="M8 21H16"/><path d="M12 17V21"/></svg>
                        </div>
                        <div class="product-info">
                            <h3>iMac</h3>
                            <p class="product-detail">Green</p>
                            <div class="product-quantity">x 1</div>
                        </div>
                        <div class="product-price">$1199.00</div>
                        <button class="remove-item">&times;</button>
                    </div>
                </div>

                <div class="coupon-section">
                    <input type="text" placeholder="Enter coupon code" id="coupon-input">
                    <button class="apply-coupon">Apply Coupon</button>
                </div>

                <div class="totals-section">
                    <div class="total-row">
                        <span>Sub total</span>
                        <span>$2597.00</span>
                    </div>
                    <div class="total-row">
                        <span>Tax</span>
                        <span>$623.28</span>
                    </div>
                    <div class="total-row grand-total">
                        <span>Total</span>
                        <span>$3220.28</span>
                    </div>
                </div>
            </section>

            <!-- Contact Form Section -->
            <section class="form-section">
                <h2>Contact Information</h2>
                <form id="checkout-form">
                    <div class="form-group">
                        <label for="name">First & Last name</label>
                        <input type="text" id="name" placeholder="Enter first & last name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter email address" required>
                    </div>
                    <div class="form-group">
                        <label for="country">Country</label>
                        <select id="country" required>
                            <option value="" disabled selected>Select your country</option>
                            <option value="finland">Finland</option>
                            <option value="usa">United States</option>
                            <option value="uk">United Kingdom</option>
                            <option value="germany">Germany</option>
                        </select>
                    </div>
                    <button type="submit" class="checkout-final-btn">Complete Checkout</button>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
